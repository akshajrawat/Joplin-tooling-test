rules:

  # Rule 1: External fetch calls
  - id: joplin-external-fetch
    patterns:
      - pattern: fetch($URL, ...)
      - pattern-not: fetch("http://localhost", ...)
      - pattern-not: fetch("http://127.0.0.1", ...)
    message: |
      External fetch() call detected.
      Plugins should not make outbound network requests unless explicitly required.
      Verify this is not exfiltrating note data.
    languages: [javascript, typescript]
    severity: WARNING

  # Rule 2: axios external calls
  - id: joplin-external-axios
    patterns:
      - pattern: axios.get($URL, ...)
      - pattern-not: axios.get("http://localhost", ...)
      - pattern-not: axios.get("http://127.0.0.1", ...)
    message: |
      External axios.get() call detected.
      Verify this is not sending user note data to an external server.
    languages: [javascript, typescript]
    severity: WARNING

  # Rule 3: joplin.data inside setInterval (arrow function)
  - id: joplin-data-in-interval-arrow
    patterns:
      - pattern: joplin.data.$METHOD(...)
      - pattern-inside: |
          setInterval(() => { ... }, ...)
    message: |
      joplin.data.$METHOD() is being called inside setInterval().
      This pattern can be used to continuously poll and exfiltrate note content.
    languages: [javascript, typescript]
    severity: ERROR

  # Rule 4: joplin.data inside setInterval (regular function)
  - id: joplin-data-in-interval-function
    patterns:
      - pattern: joplin.data.$METHOD(...)
      - pattern-inside: |
          setInterval(function() { ... }, ...)
    message: |
      joplin.data.$METHOD() is being called inside setInterval().
      This pattern can be used to continuously poll and exfiltrate note content.
    languages: [javascript, typescript]
    severity: ERROR

  # Rule 5: child_process usage
  - id: joplin-child-process
    pattern: require("child_process")
    message: |
      Direct child_process usage detected.
      Plugins should not spawn system processes. This is a high-risk pattern.
    languages: [javascript, typescript]
    severity: ERROR

  # Rule 6: Direct filesystem access
  - id: joplin-fs-access
    pattern-either:
      - pattern: require("fs")
      - pattern: require("fs/promises")
    message: |
      Direct filesystem access detected.
      Plugins should use Joplin data API instead of accessing the filesystem directly.
    languages: [javascript, typescript]
    severity: WARNING

  # Rule 7: eval() usage
  - id: joplin-eval-usage
    pattern-either:
      - pattern: eval(...)
      - pattern: new Function(...)
    message: |
      eval() or new Function() detected.
      Dynamic code execution is dangerous and should never appear in a Joplin plugin.
    languages: [javascript, typescript]
    severity: ERROR

  # Rule 8: Hardcoded secrets via regex
  - id: joplin-hardcoded-secret
    patterns:
      - pattern: $KEY = $VALUE
      - metavariable-regex:
          metavariable: $VALUE
          regex: '"(sk-[a-zA-Z0-9]+|ghp_[a-zA-Z0-9]+|AIza[a-zA-Z0-9]+)"'
    message: |
      Possible hardcoded API key or secret detected in $KEY.
      Never hardcode credentials inside a plugin. Use joplin.settings instead.
    languages: [javascript, typescript]
    severity: ERROR
