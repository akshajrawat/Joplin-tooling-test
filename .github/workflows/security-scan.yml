name: Joplin Plugin Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

  # ─── Job 1: Semgrep with custom Joplin rules ──────────────────────────────
  semgrep:
    name: Semgrep (Custom Joplin Rules)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep --quiet

      - name: Validate custom rules
        run: semgrep --validate --config .semgrep/joplin-rules.yml

      - name: Run Semgrep with custom rules
        # Exit codes: 0 = clean, 1 = findings, 2 = error
        # We capture all and let the report job decide severity
        run: |
          semgrep \
            --config .semgrep/joplin-rules.yml \
            --json \
            --output semgrep-results.json \
            src/ || EXIT=$?
          if [ "${EXIT}" = "2" ]; then
            echo "Semgrep encountered an error (exit 2). Check rule syntax."
            exit 2
          fi
          echo "Semgrep finished. Exit code: ${EXIT:-0}"
          exit 0

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 7

  # ─── Job 2: CodeQL with custom + default queries ───────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # + means: run default security-extended AND our custom queries
          queries: security-extended,+.github/codeql/custom-queries

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          output: codeql-sarif
          upload: true

      - name: Upload CodeQL SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-sarif/
          retention-days: 7

  # ─── Job 3: Merge results into single report ───────────────────────────────
  report:
    name: Generate Combined Security Report
    runs-on: ubuntu-latest
    needs: [semgrep, codeql]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Semgrep results
        uses: actions/download-artifact@v4
        with:
          name: semgrep-results
          path: .
        continue-on-error: true

      - name: Download CodeQL SARIF results
        uses: actions/download-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-sarif/
        continue-on-error: true

      - name: Generate combined report
        run: node scripts/merge-security-reports.js

      - name: Upload combined report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md
          retention-days: 30
