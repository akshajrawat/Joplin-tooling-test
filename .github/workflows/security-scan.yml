name: Joplin Plugin Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write   # needed for CodeQL to upload SARIF
  actions: read

jobs:

  # ─── Job 1: Semgrep with custom Joplin rules ────────────────────────────────
  semgrep:
    name: Semgrep (Custom Joplin Rules)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep --quiet

      - name: Run Semgrep with custom rules
        run: |
          semgrep \
            --config .semgrep/joplin-rules.yml \
            --json \
            --output semgrep-results.json \
            --no-error \
            src/
        # --no-error means the step won't fail even if findings exist
        # we handle the exit logic in the report job

      - name: Upload Semgrep results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 7

  # ─── Job 2: CodeQL analysis ─────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Using the security-extended query suite for broader coverage
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          # Save SARIF locally so we can include it in the combined report
          output: codeql-sarif
          # Also uploads to GitHub Security tab automatically
          upload: true

      - name: Upload CodeQL SARIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-sarif/
          retention-days: 7

  # ─── Job 3: Merge results and generate combined report ───────────────────────
  report:
    name: Generate Combined Security Report
    runs-on: ubuntu-latest
    needs: [semgrep, codeql]
    # Run report even if scanners found issues (but not if they crashed)
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Semgrep results
        uses: actions/download-artifact@v4
        with:
          name: semgrep-results
          path: .
        # continue even if semgrep artifact is missing
        continue-on-error: true

      - name: Download CodeQL SARIF results
        uses: actions/download-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-sarif/
        continue-on-error: true

      - name: Generate combined report
        run: node scripts/merge-security-reports.js
        # Script exits with code 1 if high severity findings exist
        # which will mark this job (and the overall workflow) as failed

      - name: Upload combined report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md
          retention-days: 30
